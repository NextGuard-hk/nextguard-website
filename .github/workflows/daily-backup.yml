name: Daily Backup (7-day retention)

on:
  schedule:
    - cron: '0 16 * * *'  # 4PM UTC = midnight HKT
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create daily backup tag
        run: |
          DATE=$(date +'%Y-%m-%d')
          TAG_NAME="backup-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete existing tag for today if re-running
          git tag -d "$TAG_NAME" 2>/dev/null || true
          git push origin --delete "$TAG_NAME" 2>/dev/null || true
          # Create new backup tag
          git tag -a "$TAG_NAME" -m "Daily backup ${DATE}"
          git push origin "$TAG_NAME"
          echo "Created backup tag: $TAG_NAME"

      - name: Clean up old backups (keep last 7 days)
        run: |
          echo "Cleaning up backup tags older than 7 days..."
          CUTOFF_DATE=$(date -d '7 days ago' +'%Y-%m-%d')
          echo "Cutoff date: $CUTOFF_DATE"
          git tag -l 'backup-*' | while read tag; do
            TAG_DATE=$(echo "$tag" | sed 's/backup-//')
            if [[ "$TAG_DATE" < "$CUTOFF_DATE" ]]; then
              echo "Deleting old backup: $tag"
              git push origin --delete "$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            else
              echo "Keeping backup: $tag"
            fi
          done
          echo "Cleanup complete."

      - name: Backup Turso threat-intel DB
        run: |
          echo "Running Turso DB backup with integrity checks..."
          RESPONSE=$(curl -s -o turso-backup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            "https://www.next-guard.com/api/v1/threat-intel/backup")
          echo "HTTP Status: $RESPONSE"
          cat turso-backup.json | jq .
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Turso DB backup failed with HTTP $RESPONSE"
            exit 1
          fi
          ERRORS=$(cat turso-backup.json | jq '.integrity.errors | length')
          if [ "$ERRORS" != "0" ]; then
            echo "::error::Turso DB integrity check found $ERRORS errors"
            exit 1
          fi
          echo "Turso DB backup verified successfully"
          cat turso-backup.json | jq '{version: .version, timestamp: .timestamp, duration_ms: .duration_ms, integrity: .integrity.status, indicators: .data.indicators.count, feeds: .data.feeds.count}'

      - name: Backup npoint.io databases
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p backups
          curl -s "${{ secrets.NPOINT_CONTACTS_URL }}" > backups/contacts-${DATE}.json
          curl -s "${{ secrets.NPOINT_RSVP_URL }}" > backups/rsvp-${DATE}.json
          curl -s "${{ secrets.NPOINT_LOGS_URL }}" > backups/logs-${DATE}.json
          cp turso-backup.json backups/turso-threat-intel-${DATE}.json
          echo "Database backups saved:"
          ls -la backups/

      - name: Upload database backups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 7
