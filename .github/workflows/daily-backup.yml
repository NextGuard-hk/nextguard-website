name: Daily Backup (7-day retention)

on:
  schedule:
    - cron: '0 16 * * *'  # 4PM UTC = midnight HKT
  workflow_dispatch:
    inputs:
      full_export:
        description: 'Run full data export (paginated)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create daily backup tag
        run: |
          DATE=$(date +'%Y-%m-%d')
          TAG_NAME="backup-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d "$TAG_NAME" 2>/dev/null || true
          git push origin --delete "$TAG_NAME" 2>/dev/null || true
          git tag -a "$TAG_NAME" -m "Daily backup ${DATE}"
          git push origin "$TAG_NAME"
          echo "Created backup tag: $TAG_NAME"

      - name: Clean up old backups (keep last 7 days)
        run: |
          echo "Cleaning up backup tags older than 7 days..."
          CUTOFF_DATE=$(date -d '7 days ago' +'%Y-%m-%d')
          git tag -l 'backup-*' | while read tag; do
            TAG_DATE=$(echo "$tag" | sed 's/backup-//')
            if [[ "$TAG_DATE" < "$CUTOFF_DATE" ]]; then
              echo "Deleting old backup: $tag"
              git push origin --delete "$tag" 2>/dev/null || true
              git tag -d "$tag" 2>/dev/null || true
            else
              echo "Keeping backup: $tag"
            fi
          done

      - name: Backup Turso threat-intel DB (integrity check)
        run: |
          echo "Running Turso DB integrity check..."
          RESPONSE=$(curl -s -o turso-backup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            "https://www.next-guard.com/api/v1/threat-intel/backup")
          echo "HTTP Status: $RESPONSE"
          cat turso-backup.json | jq .
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Turso DB backup failed with HTTP $RESPONSE"
            exit 1
          fi
          ERRORS=$(cat turso-backup.json | jq '.integrity.errors | length')
          if [ "$ERRORS" != "0" ]; then
            echo "::error::Turso DB integrity check found $ERRORS errors"
            exit 1
          fi
          echo "Turso DB integrity verified"

      - name: Backup Quotation System DB (integrity check)
        run: |
                    echo "Running Quotation System DB integrity check (with retry)..."
          # Warm-up request to wake up serverless function
          curl -s -o /dev/null --max-time 10 \
            -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            "https://www.next-guard.com/api/qt-backup" || true
          sleep 3
          # Actual backup request with retry (up to 3 attempts)
          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT of 3..."
            RESPONSE=$(curl -s -o qt-backup.json -w "%{http_code}" --max-time 55 \
              -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
              "https://www.next-guard.com/api/qt-backup")
            if [ "$RESPONSE" = "200" ]; then
              break
            fi
            echo "Attempt $ATTEMPT failed with HTTP $RESPONSE, retrying in 10s..."
            sleep 10
          done
          echo "HTTP Status: $RESPONSE"
          cat qt-backup.json | jq .
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::QT DB backup failed with HTTP $RESPONSE"
            exit 1
          fi
          QT_ERRORS=$(cat qt-backup.json | jq '.integrity.errors | length')
          if [ "$QT_ERRORS" != "0" ]; then
            echo "::error::QT DB integrity check found $QT_ERRORS errors"
            exit 1
          fi
          echo "Quotation System DB integrity verified"

      - name: Export Quotation System tables
        run: |
          echo "Exporting Quotation System data..."
          DATE=$(date +'%Y-%m-%d')
          mkdir -p backups/qt-export
          for TABLE in qt_admin_users qt_products qt_prices qt_quotations qt_lines qt_files qt_audit_log; do
            echo "  Exporting $TABLE..."
            PAGE=1
            TOTAL=0
            while true; do
              curl -s --max-time 55 -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
                "https://www.next-guard.com/api/qt-backup?table=${TABLE}&page=${PAGE}&limit=500" \
                > backups/qt-export/${TABLE}-${DATE}-page${PAGE}.json
              ROWS=$(cat backups/qt-export/${TABLE}-${DATE}-page${PAGE}.json | jq -r '.export.rows_in_page // "0"')
              HAS_MORE=$(cat backups/qt-export/${TABLE}-${DATE}-page${PAGE}.json | jq -r '.export.has_more // "false"')
              TOTAL=$((TOTAL + ROWS))
              if [ "$HAS_MORE" != "true" ]; then
                break
              fi
              PAGE=$((PAGE + 1))
              sleep 1
            done
            echo "  $TABLE: $TOTAL rows exported"
          done
          echo "QT export complete"

      - name: Full data export (paginated)
        if: github.event.inputs.full_export == 'true'
        run: |
          echo "Starting full paginated export..."
          DATE=$(date +'%Y-%m-%d')
          mkdir -p backups/full-export

          # Export feeds (small table)
          echo "Exporting feeds..."
          curl -s -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            "https://www.next-guard.com/api/v1/threat-intel/backup?table=feeds" \
            > backups/full-export/feeds-${DATE}.json
          FEED_ROWS=$(cat backups/full-export/feeds-${DATE}.json | jq -r '.export.total_rows // "error"')
          echo "Feeds exported: $FEED_ROWS rows"
          sleep 2

          # Export lookup_log
          echo "Exporting lookup_log..."
          curl -s -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            "https://www.next-guard.com/api/v1/threat-intel/backup?table=lookup_log&limit=1000" \
            > backups/full-export/lookup_log-${DATE}.json
          LOG_ROWS=$(cat backups/full-export/lookup_log-${DATE}.json | jq -r '.export.rows_in_page // "error"')
          echo "Lookup log exported: $LOG_ROWS rows"
          sleep 2

          # Export indicators (large table, paginated with 1000 rows per page)
          echo "Exporting indicators (paginated, 1000 rows/page)..."
          PAGE=1
          TOTAL_EXPORTED=0
          while true; do
            echo "  Fetching page $PAGE..."
            curl -s -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
              "https://www.next-guard.com/api/v1/threat-intel/backup?table=indicators&page=${PAGE}&limit=1000" \
              > backups/full-export/indicators-${DATE}-page${PAGE}.json
            ROWS=$(cat backups/full-export/indicators-${DATE}-page${PAGE}.json | jq -r '.export.rows_in_page // "0"')
            HAS_MORE=$(cat backups/full-export/indicators-${DATE}-page${PAGE}.json | jq -r '.export.has_more // "false"')
            TOTAL_EXPORTED=$((TOTAL_EXPORTED + ROWS))
            echo "  Page $PAGE: $ROWS rows (total so far: $TOTAL_EXPORTED)"
            if [ "$HAS_MORE" != "true" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
            sleep 2
          done
          echo "Full indicator export complete: $TOTAL_EXPORTED rows in $PAGE pages"

      - name: Backup npoint.io databases
        run: |
          DATE=$(date +'%Y-%m-%d')
          mkdir -p backups
          curl -s "${{ secrets.NPOINT_CONTACTS_URL }}" > backups/contacts-${DATE}.json
          curl -s "${{ secrets.NPOINT_RSVP_URL }}" > backups/rsvp-${DATE}.json
          curl -s "${{ secrets.NPOINT_LOGS_URL }}" > backups/logs-${DATE}.json
          cp turso-backup.json backups/turso-integrity-${DATE}.json
          cp qt-backup.json backups/qt-integrity-${DATE}.json
          echo "Database backups saved:"
          ls -la backups/
          if [ -d "backups/full-export" ]; then
            echo "Full export files:"
            ls -la backups/full-export/
          fi
          if [ -d "backups/qt-export" ]; then
            echo "QT export files:"
            ls -la backups/qt-export/
          fi

      - name: Upload database backups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backups/
          retention-days: 7

  # Send alert email via NextGuard Resend API if backup fails
  notify-failure:
    runs-on: ubuntu-latest
    needs: backup
    if: failure()
    steps:
      - name: Send failure alert email via NextGuard API
        run: |
          echo "Backup failed! Sending alert email to oscar@next-guard.com..."
          RESPONSE=$(curl -s -o alert-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.BACKUP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "error_message": "Daily backup workflow failed (includes Threat Intel + Quotation System). Check the run logs for details."
            }' \
            "https://www.next-guard.com/api/v1/threat-intel/backup-alert")
          echo "Alert API Response (HTTP $RESPONSE):"
          cat alert-response.json | jq . 2>/dev/null || cat alert-response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::Failed to send alert email (HTTP $RESPONSE)"
          else
            echo "Alert email sent successfully to oscar@next-guard.com"
          fi
